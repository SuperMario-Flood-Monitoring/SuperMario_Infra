name: Bootstrap Production

on:
  workflow_dispatch:
    inputs:
      run_server_init:
        description: Run server-init.sh before HTTPS setup
        required: true
        type: boolean
        default: true
      issue_tls_certificate:
        description: Issue or refresh the initial Let's Encrypt certificate
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: production-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/home/seoktae/Documents/TEAM_SUPERMARIO' }}
      RUN_SERVER_INIT: ${{ inputs.run_server_init }}
      ISSUE_TLS_CERTIFICATE: ${{ inputs.issue_tls_certificate }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Checkout infra
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Sync infra files to server
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            --exclude '.git/' \
            --exclude '.env' \
            --exclude 'runtime/*.env' \
            --exclude 'backups/' \
            ./ "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/"

      - name: Render production env from YAML secret
        env:
          PRODUCTION_ENV_YAML_B64: ${{ secrets.PRODUCTION_ENV_YAML_B64 }}
        run: |
          if [ -z "$PRODUCTION_ENV_YAML_B64" ]; then
            echo "Missing PRODUCTION_ENV_YAML_B64 secret." >&2
            exit 1
          fi

          python3 -m pip install --quiet pyyaml
          python3 - <<'PY'
          import base64
          import os
          import re
          from pathlib import Path

          import yaml

          raw = os.environ["PRODUCTION_ENV_YAML_B64"]
          decoded = base64.b64decode(raw).decode("utf-8")
          data = yaml.safe_load(decoded)

          if not isinstance(data, dict):
              raise SystemExit("PRODUCTION_ENV_YAML_B64 must decode to a YAML mapping.")

          key_pattern = re.compile(r"^[A-Z][A-Z0-9_]*$")

          def stringify(value):
              if value is None:
                  return ""
              if isinstance(value, bool):
                  return "true" if value else "false"
              return str(value)

          def shell_quote(value):
              return "'" + value.replace("'", "'\"'\"'") + "'"

          lines = []
          for key, value in data.items():
              key = str(key)
              if not key_pattern.match(key):
                  raise SystemExit(f"Invalid env key: {key}")
              lines.append(f"{key}={shell_quote(stringify(value))}")

          out = Path(os.environ["RUNNER_TEMP"]) / "production.env"
          out.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"Wrote {out}")
          PY

      - name: Upload production env to server
        run: |
          scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" "$RUNNER_TEMP/production.env" \
            "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/.env"
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "chmod 600 '$DEPLOY_PATH/.env'"

      - name: Run server init
        if: ${{ inputs.run_server_init }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "cd '$DEPLOY_PATH' && chmod +x scripts/*.sh && DEPLOY_PATH='$DEPLOY_PATH' ./scripts/server-init.sh"

      - name: Login server to GHCR
        if: ${{ env.GHCR_USERNAME != '' && env.GHCR_TOKEN != '' }}
        run: |
          GHCR_USERNAME_ESCAPED="$(printf '%q' "$GHCR_USERNAME")"
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "cd '$DEPLOY_PATH' && chmod +x scripts/*.sh && GHCR_USERNAME=$GHCR_USERNAME_ESCAPED ./scripts/login-ghcr.sh"

      - name: Initialize HTTPS certificate
        if: ${{ inputs.issue_tls_certificate }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "cd '$DEPLOY_PATH' && chmod +x scripts/*.sh && ./scripts/init-letsencrypt.sh"

      - name: Notify Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.ACTIONS_TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.ACTIONS_TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          JOB: ${{ github.job }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Telegram secrets are not set. Skipping notification."
            exit 0
          fi

          BOT_TOKEN="$(printf '%s' "$BOT_TOKEN" | tr -d '\r\n')"
          CHAT_ID="$(printf '%s' "$CHAT_ID" | tr -d '[:space:]')"
          BOT_TOKEN="${BOT_TOKEN%\"}"; BOT_TOKEN="${BOT_TOKEN#\"}"
          BOT_TOKEN="${BOT_TOKEN%\'}"; BOT_TOKEN="${BOT_TOKEN#\'}"
          CHAT_ID="${CHAT_ID%\"}"; CHAT_ID="${CHAT_ID#\"}"
          CHAT_ID="${CHAT_ID%\'}"; CHAT_ID="${CHAT_ID#\'}"

          case "$STATUS" in
            success) STATUS_LABEL="성공"; STATUS_ICON="✅" ;;
            failure) STATUS_LABEL="실패"; STATUS_ICON="❌" ;;
            cancelled) STATUS_LABEL="취소"; STATUS_ICON="⚠️" ;;
            *) STATUS_LABEL="$STATUS"; STATUS_ICON="ℹ️" ;;
          esac

          SHORT_SHA="${COMMIT_SHA:0:7}"
          MESSAGE=$(printf '%s\n' \
            "🛠️ SuperMario 인프라 Actions 알림" \
            "" \
            "상태: ${STATUS_ICON} ${STATUS_LABEL}" \
            "레포: ${REPOSITORY}" \
            "워크플로우: ${WORKFLOW}" \
            "잡: ${JOB}" \
            "브랜치: ${BRANCH}" \
            "실행자: ${ACTOR}" \
            "이벤트: ${EVENT_NAME}" \
            "커밋: ${SHORT_SHA}" \
            "" \
            "서버 초기화: ${RUN_SERVER_INIT}" \
            "TLS 인증서 발급: ${ISSUE_TLS_CERTIFICATE}" \
            "" \
            "실행 로그:" \
            "${RUN_URL}")

          RESPONSE_FILE="${RUNNER_TEMP}/telegram-response.json"
          HTTP_CODE=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MESSAGE}" \
            || true)

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Telegram notification failed with HTTP ${HTTP_CODE}."
            cat "$RESPONSE_FILE" || true
          fi
