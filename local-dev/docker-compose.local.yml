name: supermario-local

services:
  postgres:
    image: "${POSTGRES_IMAGE:-public.ecr.aws/docker/library/postgres:16-alpine}"
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-supermario}"
      POSTGRES_USER: "${POSTGRES_USER:-supermario}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-supermario_local_password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../../SuperMario_Django/backend
      dockerfile_inline: |
        ARG PYTHON_BASE_IMAGE=python:3.12-slim
        FROM $${PYTHON_BASE_IMAGE}

        ENV PYTHONDONTWRITEBYTECODE=1 \
            PYTHONUNBUFFERED=1 \
            DATABASE_ENGINE=sqlite \
            SQLITE_PATH=/data/db.sqlite3

        WORKDIR /app

        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        RUN mkdir -p /data

        EXPOSE 8000
      args:
        PYTHON_BASE_IMAGE: "${BACKEND_PYTHON_BASE_IMAGE:-public.ecr.aws/docker/library/python:3.12-slim}"
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: "local"
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend,${LOCAL_DEV_HOST_IP:-localhost}"
      DATABASE_ENGINE: "postgres"
      POSTGRES_DB: "${POSTGRES_DB:-supermario}"
      POSTGRES_USER: "${POSTGRES_USER:-supermario}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-supermario_local_password}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://${LOCAL_DEV_HOST_IP:-localhost}:5173"
      CORS_ALLOW_CREDENTIALS: "true"
      SUPERMARIO_PUBLIC_BASE_URL: "http://${LOCAL_DEV_HOST_IP:-localhost}:5173"
      SUPERMARIO_API_BASE_URL: "http://${LOCAL_DEV_HOST_IP:-localhost}:8000/api"
      SUPERMARIO_LLM_BASE_URL: "http://llm:8000/llm"
      SUPERMARIO_LLM_ANALYZE_URL: "http://llm:8000/llm/analyze"
      SUPERMARIO_INITIAL_ADMIN_USERNAME: "admin"
      SUPERMARIO_INITIAL_ADMIN_PASSWORD: "supermario4"
    depends_on:
      postgres:
        condition: service_healthy
      llm:
        condition: service_started
    volumes:
      - ../../SuperMario_Django/backend:/app
      - backend_data:/data
    command: >
      sh -c "python manage.py migrate &&
             python manage.py ensure_admin_user --only-if-no-admin &&
             python manage.py runserver 0.0.0.0:8000"

  llm:
    build:
      context: ../../SuperMario_LLM
      dockerfile_inline: |
        ARG PYTHON_BASE_IMAGE=python:3.11-slim
        FROM $${PYTHON_BASE_IMAGE}

        WORKDIR /app

        ENV PYTHONDONTWRITEBYTECODE=1 \
            PYTHONUNBUFFERED=1

        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt

        EXPOSE 8000
      args:
        PYTHON_BASE_IMAGE: "${LLM_PYTHON_BASE_IMAGE:-public.ecr.aws/docker/library/python:3.11-slim}"
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - ../../SuperMario_LLM/.env
    environment:
      APP_ENV: "local"
      LLM_API_PREFIX: "/llm"
    volumes:
      - ../../SuperMario_LLM:/app
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../../SuperMario_React
      dockerfile_inline: |
        ARG NODE_VERSION=24
        ARG NODE_BASE_IMAGE=node:$${NODE_VERSION}-alpine
        FROM $${NODE_BASE_IMAGE}

        WORKDIR /app

        ENV npm_config_update_notifier=false

        EXPOSE 5173
      args:
        NODE_VERSION: "${FRONTEND_NODE_VERSION:-24}"
        NODE_BASE_IMAGE: "${FRONTEND_NODE_BASE_IMAGE:-public.ecr.aws/docker/library/node:24-alpine}"
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_APP_ENV: "local"
      VITE_SWMM_ENGINE_URL: "http://${LOCAL_DEV_HOST_IP:-localhost}:8000/api"
      VITE_AUTH_LOGIN_PATH: "/api/auth/login"
      VITE_AUTH_REFRESH_PATH: "/api/auth/refresh"
      VITE_AUTH_LOGOUT_PATH: "/api/auth/logout"
      VITE_AUTH_USE_MOCK_LOGIN: "false"
    depends_on:
      - backend
    volumes:
      - ../../SuperMario_React:/app
      - react_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_data:
  react_node_modules:
